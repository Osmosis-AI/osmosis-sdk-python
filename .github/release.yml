changelog:
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking
    - title: "🚀 Features"
      labels:
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
    - title: "📖 Documentation"
      labels:
        - documentation
    - title: "🔧 Maintenance"
      labels:
        - chore
        - ci
        - dependencies
        - refactor
    - title: "Other Changes"
      labels:
        - "*"
