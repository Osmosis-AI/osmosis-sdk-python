name: Auto approve

on: pull_request_target

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    if: >-
      github.actor == 'dependabot[bot]' ||
      github.actor == 'BaiqingL' ||
      github.actor == 'JoyboyBrian' ||
      github.actor == 'JakeTrock' ||
      github.actor == 'allenlinsh' ||
      github.actor == 'mathewjhan' ||
      github.actor == 'pandyamarut' ||
      github.actor == 'artem-osmosis'
    steps:
      - name: Approve PR if not already approved
        run: |
          if [ "$(gh pr view "$PR_URL" --json reviewDecision --jq '.reviewDecision')" = "APPROVED" ]; then
            echo "PR already approved, skipping."
            exit 0
          fi
          gh pr review --approve "$PR_URL"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
