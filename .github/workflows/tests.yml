name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/ruff-action@v3

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  typecheck-pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Run pyright
        run: uv run pyright osmosis_ai/
      - name: Verify public API types
        run: |
          output=$(uv run --no-editable pyright --verifytypes osmosis_ai --ignoreexternal 2>&1) || true
          echo "$output"
          # agent_adapter inherits from harbor's BaseInstalledAgent which has no
          # type stubs, causing "base class unknown" in --verifytypes. Filter out
          # these known errors and fail only on unexpected ones.
          unexpected=$(echo "$output" | awk '
            /^osmosis_ai\./ { sym = $0 }
            /error:/ { if (sym !~ /agent_adapter/) print $0 }
          ')
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected verifytypes errors:"
            echo "$unexpected"
            exit 1
          fi

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: uv run pytest --cov=osmosis_ai --cov-branch --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && !github.event.pull_request.head.repo.fork
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Check package
        run: uvx twine check --strict dist/*
