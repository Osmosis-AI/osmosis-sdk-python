coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 70%

ignore:
  # CLI command groups (Typer thin shells that delegate to business logic).
  # Tested via manual/integration testing, not unit tests.
  - "osmosis_ai/cli/commands/"
  - "osmosis_ai/cli/main.py"
  - "osmosis_ai/cli/upgrade.py"
  # Platform CLI business logic — API calls, OAuth flows, interactive prompts.
  - "osmosis_ai/platform/cli/"
  # Rollout CLI helpers — server startup, eval commands.
  - "osmosis_ai/rollout/cli.py"
  - "osmosis_ai/rollout/eval/**/cli.py"
  - "osmosis_ai/rollout/server/serve.py"
  # Interactive prompt helpers (questionary/prompt_toolkit UI).
  - "osmosis_ai/cli/prompts.py"
  # Rollout v2 — ABCs & type definitions (no logic to test).
  - "osmosis_ai/rollout_v2/agent_workflow.py"
  - "osmosis_ai/rollout_v2/grader.py"
  - "osmosis_ai/rollout_v2/backend/base.py"
  - "osmosis_ai/rollout_v2/types/"
  # Rollout v2 — framework integrations (require external deps: strands, etc.).
  - "osmosis_ai/rollout_v2/integrations/"
  # Rollout v2 — Harbor backend (container orchestration, requires Docker/infra).
  - "osmosis_ai/rollout_v2/backend/harbor/"

comment:
  layout: "diff, flags, files"
  require_changes: true
