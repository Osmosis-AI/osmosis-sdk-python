# Osmosis eval config — multiply starter template.
#
# Generated by `osmosis template apply multiply` directly into
# configs/eval/multiply.toml. The matching rollout lives at
# rollouts/multiply/ — install its deps with `pip install -e rollouts/multiply`.
#
# Run with:
#   osmosis --json eval run configs/eval/multiply.toml
#
# Before running:
#   Set [llm].model to a LiteLLM model your environment can reach.
#   The bundled data/multiply.jsonl rows use system_prompt, user_prompt,
#   and ground_truth; ground_truth is passed to MultiplyGrader via ctx.label.

[eval]
rollout = "multiply"
entrypoint = "main.py"
dataset = "data/multiply.jsonl"
# limit =
# offset = 0
# fresh = false
# retry_failed = false

[llm]
model = "openai/gpt-5-mini"           # Replace with your preferred LiteLLM model.
# base_url =
# api_key_env = "OPENAI_API_KEY"

# MultiplyGrader is auto-discovered from rollouts/multiply/main.py.

[runs]
n = 1
batch_size = 1
pass_threshold = 1.0

[output]
log_samples = false
# output_path =
# quiet = false
# debug = false
