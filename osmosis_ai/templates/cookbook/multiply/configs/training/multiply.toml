# Osmosis training config — multiply starter template.
#
# Generated by `osmosis template apply multiply` directly into
# configs/training/multiply.toml. The matching rollout lives at
# rollouts/multiply/ — install its deps with `pip install -e rollouts/multiply`.
#
# Submit with:
#   osmosis --json train submit configs/training/multiply.toml
#
# Before running:
#   1. Upload a multiplication dataset (questions + numeric ground-truth labels)
#      via `osmosis dataset upload <file>` and put its name below.
#   2. Pin model_path to a model your workspace has access to.

[experiment]
rollout = "multiply"
entrypoint = "main.py"
model_path = "Qwen/Qwen3.5-35B-A3B"   # Replace with the target base model.
dataset = "<your-multiply-dataset>"   # Replace with the uploaded dataset name.
# commit_sha =                        # Pin to a specific commit (default: latest)

[training]
# Defaults are conservative for a small starter run.
# lr = 1e-6
total_epochs = 1
n_samples_per_prompt = 8
global_batch_size = 64
max_prompt_length = 2048
max_response_length = 2048

[sampling]
rollout_temperature = 1.0
rollout_top_p = 1.0

[checkpoints]
checkpoint_save_freq = 20
# eval_interval =
